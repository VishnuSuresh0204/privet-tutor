{% extends 'Student/common_st.html' %}
{% load static %}

{% for m in messages %}
<script>
    alert("{{m}}")
</script>
{% endfor %}

{% block content %}

<!-- Hero Section -->
<section class="hero-wrap" style="background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('../static/images/bg_2.jpg') no-repeat center center/cover; height: 350px;">
    <div class="container">
        <div class="row no-gutters slider-text align-items-center justify-content-center">
            <div class="col-md-9 text-center text-white">
                <h1 class="mb-3">View E-Books</h1>
            </div>
        </div>
    </div>
</section>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">

<!-- Styling -->
<style>
    body {
        background-color: #f8f9fa;
    }

    .search-container {
        text-align: center;
        margin: 30px auto;
        max-width: 600px;
    }

    .search-container input {
        width: 100%;
        padding: 10px;
        border: 2px solid #007bff;
        border-radius: 5px;
        outline: none;
        transition: 0.3s ease-in-out;
    }

    .search-container input:focus {
        box-shadow: 0 0 8px rgba(0, 123, 255, 0.5);
    }

    .book-card {
        margin-bottom: 30px;
        display: flex;
        justify-content: center;
    }

    .card {
        max-width: 500px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        transition: 0.3s ease-in-out;
        background: white;
    }

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px 10px 0 0;
    }

    .card-body {
        padding: 15px;
    }

    .card-title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .card-text {
        font-size: 14px;
        color: #555;
    }

    .card a {
        color: #007bff;
        text-decoration: none;
    }

    .card a:hover {
        text-decoration: underline;
    }
</style>

<!-- Search Box -->
<div class="search-container">
    <input type="text" id="bookSearch" placeholder="Search by book name...">
</div>

<!-- E-Books Grid -->
<div class="container">
    <div class="row justify-content-center">
        {% for i in data %}
        <div class="col-md-4 col-lg-3 book-card" data-book-name="{{ i.Bookname }}">
            <div class="card">
                <img src="../static/media/{{i.Image}}" alt="Book Image">
                <div class="card-body">
                    <h5 class="card-title">{{ i.Bookname }}</h5>
                    <p class="card-text">{{ i.Description }}</p>
                    <p class="card-text"><small class="text-muted">{{i.subject1}}</small></p>
                    <p class="card-text"><small class="text-muted">Link: <a href="{{i.link}}" target="_blank">{{i.link}}</a></small></p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<!-- JavaScript for Search Filtering -->
<script>
    document.getElementById('bookSearch').addEventListener('input', function () {
        const searchValue = this.value.toLowerCase();
        const bookCards = document.querySelectorAll('.book-card');

        bookCards.forEach(function (card) {
            const bookName = card.getAttribute('data-book-name').toLowerCase();
            card.style.display = bookName.includes(searchValue) ? 'block' : 'none';
        });
    });
</script>

{% endblock %}
