{% extends 'Student/common_st.html' %}
{% load static %}

{% for m in messages %}
<script>
    alert("{{m}}")
</script>
{% endfor %}

{% block content %} 

<!-- Hero Section -->
<section class="hero-wrap" style="background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('../static/images/bg_2.jpg') no-repeat center center/cover; height: 350px;">
    <div class="container">
        <div class="row no-gutters slider-text align-items-center justify-content-center">
            <div class="col-md-9 text-center text-white">
                <h1 class="mb-3">View Review</h1>
            </div>
        </div>
    </div>
</section>

<!-- Styling -->
<style>
    body {
        background-color: #f8f9fa;
    }

    .review-container {
        max-width: 900px;
        margin: 50px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        /* background: #007bff; */
        color: white;
    }

    th, td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #ddd;
    }

    tr:nth-child(even) {
        background: #f2f2f2;
    }

    tr:hover {
        background: #ddd;
    }
</style>

<!-- Review Table -->
<section class="ftco-section">
    <div class="review-container">
        <h3 class="mb-4 text-center">View Review</h3>
        <table class="table">
            <thead>
                <tr class="table-info">
                    <th>Teacher Name</th>
                    <th>Rating</th>
                    <th>Review</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for i in data %}
                <tr>
                    <td>{{ i.teacher.username5 }}</td>
                    <td>{{ i.rating }}🌟</td>
                    <td>{{ i.review }}</td>
                    <td>
                        <a href="/editreview_stu?id={{i.id}}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <a href="/deletereview_stu?id={{i.id}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>

{% endblock %}
